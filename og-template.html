<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:radial-gradient(1200px 600px at 78% -10%, #1a1c3a 0%, #0a0a0b 55%);
    color:#e8e6e3;font-family:'DM Sans',sans-serif;
    padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.12em;text-transform:uppercase;color:#818cf8}
  h1{font-size:104px;font-weight:700;line-height:1.0;letter-spacing:-.03em;margin-top:18px}
  h1 .accent{color:#6366f1}
  .sub{font-size:30px;color:#9a9a9e;font-style:italic;margin-top:22px;max-width:880px;line-height:1.4}
  .foot{display:flex;justify-content:space-between;align-items:flex-end}
  .url{font-family:'JetBrains Mono',monospace;font-size:26px;color:#6366f1;font-weight:700}
  .who{font-size:24px;color:#5e5e63;text-align:right;line-height:1.4}
  .rule{height:4px;width:120px;background:#6366f1;border-radius:2px;margin:14px 0 0}
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Michael Borck &middot; Curtin University</div>
    <h1>Conversation,<br><span class="accent">not Delegation</span></h1>
    <div class="rule"></div>
    <div class="sub">The AI teaching, tools &amp; research: the big picture, in one place.</div>
  </div>
  <div class="foot">
    <div class="url">bigpicture.borck.dev</div>
    <div class="who">Lecturer &amp; AI Facilitator<br>School of Marketing &amp; Management</div>
  </div>
</body>
</html>
